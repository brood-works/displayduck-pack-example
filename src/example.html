<div class="widget">
  <div class="title">
    <div class="image">
      <img src="{{ASSETS}}/img/logo.png" alt="DisplayDuck Logo" />
    </div>
    <div class="text">
      <h1>Example Widgeth</h1>
    </div>
  </div>
  <div class="content">
    <p>This is an example widget for development purposes.</p>
    <button id="btn">Show passed config</button>
    {{#if showConfig()}}
      <div>
        {{#each Object.entries(config().config || {})}}
          <div class="key-value">
            <span class="key">
              {{ this[0] }}:
            </span>
            <span class="value">
              {{ this[1] }}
            </span>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</div>
