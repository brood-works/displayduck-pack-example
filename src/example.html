<div class="widget">
  <h1><i class="fas fa-cog"></i> {{ title() }}</h1>
  <button id="btn">Show passed configz?</button>
  {{#if showConfig()}}
    <div>
      {{#each Object.entries(config().config || {})}}
        <div>{{ this[0] }}: {{ this[1] }}</div>
      {{/each}}
    </div>
  {{/if}}
</div>
